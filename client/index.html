<!doctype html>
<html lang="pl">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary Meta Tags -->
    <title>WrapperHub — Platforma narzędzi AI</title>
    <meta name="title" content="WrapperHub — Platforma narzędzi AI" />
    <meta name="description" content="Korzystaj z najlepszych narzędzi AI — chat, generowanie obrazów, analiza dokumentów — wszystko w jednym miejscu. Bez konfiguracji, bez własnych kluczy API." />
    <meta name="keywords" content="AI tools, chat AI, generowanie obrazów, analiza dokumentów, wrapper AI, platforma AI, GPT-4, DALL-E" />
    <meta name="author" content="WrapperHub" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="Polish" />
    <meta name="theme-color" content="#7c3aed" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://wrapperhub.manus.space/" />
    <meta property="og:title" content="WrapperHub — Platforma narzędzi AI" />
    <meta property="og:description" content="Korzystaj z najlepszych narzędzi AI — chat, generowanie obrazów, analiza dokumentów — wszystko w jednym miejscu. Bez konfiguracji, bez własnych kluczy API." />
    <meta property="og:image" content="https://wrapperhub.manus.space/og-image.png" />
    <meta property="og:locale" content="pl_PL" />
    <meta property="og:site_name" content="WrapperHub" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://wrapperhub.manus.space/" />
    <meta name="twitter:title" content="WrapperHub — Platforma narzędzi AI" />
    <meta name="twitter:description" content="Korzystaj z najlepszych narzędzi AI bez konfiguracji i własnych kluczy API." />
    <meta name="twitter:image" content="https://wrapperhub.manus.space/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://wrapperhub.manus.space/" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Structured Data / JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "WrapperHub",
      "description": "Platforma narzędzi AI — chat, generowanie obrazów, analiza dokumentów",
      "url": "https://wrapperhub.manus.space",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "AggregateOffer",
        "priceCurrency": "USD",
        "lowPrice": "0",
        "highPrice": "99"
      },
      "featureList": [
        "Chat AI (GPT-4)",
        "Generowanie obrazów (DALL-E 3)",
        "Analiza dokumentów",
        "Asystent kodu",
        "Transkrypcja audio"
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
